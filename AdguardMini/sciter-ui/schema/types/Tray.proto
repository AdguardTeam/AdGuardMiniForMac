syntax = "proto3";

option optimize_for = CODE_SIZE;

import "Common.proto";

message GlobalSettings {
    bool enabled = 1;
    bool newVersionAvailable = 3;
    ReleaseVariants releaseVariant = 4;
    string language = 5;
    bool debug_logging = 6;
    bool allow_telemetry = 8;
    Theme theme = 9;
    int64 last_filters_update_timestamp_ms = 10;
}
