name: 🐞 Bug report
description: If you found something that we should know about
labels: "Bug"
body:
  - type: checkboxes
    attributes:
      label: Please answer the following questions for yourself before submitting an issue
      options:
        - label: Filters were updated before reproducing an issue
          required: true
        - label: I made sure all content blockers are enabled in Safari settings
          required: true
        - label: I checked the [knowledge base](https://adguard.com/kb/) and found no answer
          required: true
        - label: I checked to make sure that this issue has not already been filed
          required: true
  - type: input
    id: app_version
    attributes:
      label: AdGuard version
      description: What version of our application are you running?
      placeholder: For example, 2.0.0
    validations:
      required: true
  - type: input
    id: safari_version
    attributes:
      label: Safari version
      description: What version of Safari do you use?
      placeholder: For example, Safari 18.0
    validations:
      required: true
  - type: input
    id: os_version
    attributes:
      label: macOS version
      description: What version of macOS do you use?
      placeholder: For example, macOS Sequoia 15.0
    validations:
      required: true

  - type: markdown
    attributes:
      value: "### What filters do you have enabled?"

  - type: markdown
    attributes:
      value: |
        Select enabled filters if they are related to the application bug.
        If the issue is related to the filtering (missed ads, cookie, etc.)
        use the [Web Reporting Tool](https://kb.adguard.com/technical-support/reporting-tool) please.

  - type: dropdown
    id: filters_adblock
    attributes:
      label: Ad Blocking
      multiple: true
      options:
        - AdGuard Base filter
        - AdGuard Mobile Ads filter
        - EasyList
    validations:
      required: false

  - type: dropdown
    id: filters_privacy
    attributes:
      label: Privacy
      multiple: true
      options:
        - AdGuard Tracking Protection filter
        - EasyPrivacy
        - Peter Lowe's Blocklist
        - Fanboy's Anti-Facebook List
        - uBlock Origin – Block Outsider Intrusion into LAN
    validations:
      required: false

  - type: dropdown
    id: filters_social
    attributes:
      label: Social
      multiple: true
      options:
        - AdGuard Social Media filter
        - Fanboy's Social Blocking List
    validations:
      required: false

  - type: dropdown
    id: filters_annoyances
    attributes:
      label: Annoyances
      multiple: true
      options:
        - AdGuard Cookie Notices filter
        - AdGuard Popups filter
        - AdGuard Mobile App Banners filter
        - AdGuard Other Annoyances filter
        - AdGuard Widgets filter
        - Adblock Warning Removal List
        - Fanboy's Annoyances
        - Web Annoyances Ultralist
        - EasyList Cookie List
        - Dandelion Sprout's Annoyances List
    validations:
      required: false

  - type: dropdown
    id: filters_security
    attributes:
      label: Security
      multiple: true
      options:
        - Online Malicious URL Blocklist
        - Phishing URL Blocklist
        - Scam Blocklist by DurableNapkin
        - uBlock Origin – Badware risks
        - Dandelion Sprout's Anti-Malware List
    validations:
      required: false

  - type: dropdown
    id: filters_other
    attributes:
      label: Other
      multiple: true
      options:
        - Filter unblocking search ads and self-promotion
        - AdGuard Experimental filter
        - Fanboy's Anti-thirdparty Fonts
    validations:
      required: false

  - type: dropdown
    id: filters_regional
    attributes:
      label: Language-specific
      multiple: true
      options:
        - AdGuard Chinese filter
        - AdGuard Dutch filter
        - AdGuard French filter
        - AdGuard German filter
        - AdGuard Japanese filter
        - AdGuard Russian filter
        - AdGuard Spanish/Portuguese filter
        - AdGuard Turkish filter
        - AdGuard Ukrainian filter
        - ABPindo
        - ABPVN List
        - Adblock List for Finland
        - AdBlockID
        - Bulgarian list
        - CJX's Annoyances List
        - Dandelion Sprout's Nordic Filters
        - Dandelion Sprout's Serbo-Croatian List
        - EasyList China
        - EasyList Czech and Slovak
        - EasyList Dutch
        - EasyList Germany
        - EasyList Hebrew
        - EasyList Italy
        - EasyList Lithuania
        - EasyList Polish
        - EasyList Portuguese
        - EasyList Spanish
        - EasyList Thailand
        - Estonian List
        - Frellwit's Swedish Filter
        - Greek AdBlock Filter
        - Hungarian filter
        - Icelandic ABP List
        - IndianList
        - KAD - Anti-Scam
        - Latvian List
        - List-KR Classic filter list
        - Liste AR
        - Liste FR
        - Macedonian adBlock Filters
        - Official Polish filters for AdBlock, uBlock Origin & AdGuard
        - Persian Blocker
        - Polish Annoyances Filters
        - Polish Anti Adblock Filters
        - Polish Anti-Annoying Special Supplement
        - Polish GDPR-Cookies Filters
        - Polish Social Filters
        - road-block light
        - ROList
        - ROLIST2
        - RU AdList: Counters
        - xinggsf
        - Xfiles
        - YousList
    validations:
      required: false

  - type: textarea
    id: what-happened
    attributes:
      label: Issue Details
      description: Please provide a set of steps to reproduce the issue.
      value: |
        Steps to reproduce:
        1.
        2.
        3.
    validations:
      required: true
  - type: textarea
    id: how_it_should_be
    attributes:
      label: Expected Behavior
      placeholder: A clear and concise description of what you expected to happen.
    validations:
      required: false
  - type: textarea
    id: how_it_is
    attributes:
      label: Actual Behavior
      placeholder: A clear description of what happened instead.
    validations:
      required: true
  - type: textarea
    id: screens
    attributes:
      label: Screenshots
      description: |
        If applicable add screenshots explaining your problem.
        You can drag and drop images or paste them from clipboard.
        Use `<details> </details>` tag to hide screenshots under the spoiler.
      value: |
          <details><summary>Screenshot 1:</summary>

          <!-- paste screenshot here -->

          </details>
    validations:
      required: false
  - type: textarea
    id: additional
    attributes:
      label: Additional Information
      placeholder: Add any other context about the problem here.
    validations:
      required: false
